<table mat-table [dataSource]="yearsWithMultipleWinners" class="table-container">
    <ng-container matColumnDef="year">
        <th mat-header-cell *matHeaderCellDef> Year </th>
        <td mat-cell *matCellDef="let year"> {{year.year}} </td>
    </ng-container>
    <ng-container matColumnDef="winnerCount">
        <th mat-header-cell *matHeaderCellDef> Winner Count </th>
        <td mat-cell *matCellDef="let year"> {{year.winnerCount}} </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
