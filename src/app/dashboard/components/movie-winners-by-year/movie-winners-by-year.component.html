<div class="row">
    <div class="col-md-10">
        <mat-form-field class="w-100">
            <input matInput type="number" name="year" placeholder="Search by year" [(ngModel)]="year" >
        </mat-form-field>
    </div>
    <div class="col-md-2">
        <button mat-fab color="primary" (click)="loadData()">
            <mat-icon aria-hidden="false" aria-label="Example search icon" fontIcon="search"></mat-icon>
        </button>
    </div>
</div>

<table mat-table [dataSource]="moviesByYear" class="table-container">
    <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef> Id </th>
        <td mat-cell *matCellDef="let movie"> {{movie.id}} </td>
    </ng-container>
    <ng-container matColumnDef="year">
        <th mat-header-cell *matHeaderCellDef> Year </th>
        <td mat-cell *matCellDef="let movie"> {{movie.year}} </td>
    </ng-container>
    <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef> Title </th>
        <td mat-cell *matCellDef="let movie"> {{movie.title}} </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
