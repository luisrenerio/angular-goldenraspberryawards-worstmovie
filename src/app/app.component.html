<div class="main-container">
<mat-toolbar color="primary" class="justify-content-between">
  <div>
    <button mat-icon-button color="primary" (click)="drawer.toggle()" class="toggle-button">
      <mat-icon>menu</mat-icon> 
    </button>
    <span>Frontend Angular Test</span>
  </div>
  
  <button mat-icon-button (click)="toggleTheme()">
    <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</mat-toolbar>
<mat-drawer-container>
  <mat-drawer #drawer mode="side" opened class="sidenav-drawer">
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">Dashboard</a>
      <a mat-list-item routerLink="/movies" routerLinkActive="active-link">List</a>
    </mat-nav-list>
  </mat-drawer>
  <mat-drawer-content>
    <router-outlet/>
  </mat-drawer-content>
</mat-drawer-container>
</div>
